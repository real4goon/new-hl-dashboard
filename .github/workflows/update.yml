name: 비급여 데이터 수집 및 배포

on:
  workflow_dispatch:
    inputs:
      hospital:
        description: '수집할 병원 (비워두면 전체 수집, 쉼표로 여러 개 가능: 한림성심병원,서울대병원)'
        required: false
        default: ''
        type: string

  schedule:
    - cron: '0 1 * * 1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests

      - name: 데이터 수집
        run: |
          INPUT="${{ github.event.inputs.hospital }}"
          if [ -z "$INPUT" ]; then
            echo "전체 병원 수집"
            python collect_data.py --force
          else
            # 쉼표로 구분된 병원 목록을 하나씩 수집
            IFS=',' read -ra HOSPITALS <<< "$INPUT"
            for HOSP in "${HOSPITALS[@]}"; do
              HOSP=$(echo "$HOSP" | xargs)  # 앞뒤 공백 제거
              echo "수집: $HOSP"
              python collect_data.py --hospital "$HOSP" --force
            done
          fi

      - name: 변경사항 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "데이터 업데이트: $(date '+%Y-%m-%d %H:%M') KST"
          git push
